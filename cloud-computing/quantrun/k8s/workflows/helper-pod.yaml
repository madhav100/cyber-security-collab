apiVersion: v1
kind: Pod
metadata:
  name: results-helper
  namespace: quant-dev
spec:
  restartPolicy: Never
  containers:
    - name: helper
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: results
          mountPath: /output
  volumes:
    - name: results
      persistentVolumeClaim:
        claimName: quant-results-pvc
