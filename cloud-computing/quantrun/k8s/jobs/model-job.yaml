apiVersion: batch/v1
kind: Job
metadata:
  name: simple-job-REPLACE_RUNID
  namespace: quant-dev
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: runner
          image: quantrun:local
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL
              value: "simple_job"
            - name: RUN_ID
              value: "REPLACE_RUNID"
            - name: CONFIG_JSON
              value: 'REPLACE_CONFIGJSON'
            - name: OUT_DIR
              value: "/output"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: results
              mountPath: /output
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: quant-results-pvc
